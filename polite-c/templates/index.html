<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Polite C - Mini IDE (En desarrollo...)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 20px; }
        .ide-container { display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; gap: 15px; }
        h1 { color: #2c3e50; text-align: center; }
        textarea { width: 100%; font-family: 'Courier New', Courier, monospace; font-size: 14px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        #editor { height: 300px; background-color: #fff; color: #333; }
        #console { height: 150px; background-color: #1e1e1e; color: #a6e22e; border: none; white-space: pre-wrap; }
        button { background-color: #27ae60; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; align-self: flex-end; }
        button:hover { background-color: #219150; }
    </style>
</head>
<body>

<div class="ide-container">
    <h1>Polite C (PC) Interactive IDE</h1>
    
    <textarea id="editor" placeholder="Escribe tu código cortés aquí...">!comment: "Mi primer programa en Polite C"

hello main! please do this:
    please say: "Hola Mundo desde el mini IDE"
thanks!</textarea>
    
    <button onclick="executeCode()">Ejecutar Código</button>
    
    <h3>Consola de Salida</h3>
    <textarea id="console" readonly placeholder="Los resultados aparecerán aquí..."></textarea>
</div>

<script>
    // Almacén temporal de las variables que el usuario va ingresando en esta ejecución
let currentInputs = {};

function executeCode(resumeVariable = null, resumeValue = null) {
    const codeContent = document.getElementById('editor').value;
    const consoleOutput = document.getElementById('console');
    
    // Si estamos reanudando porque el usuario nos dio un dato, lo guardamos
    if (resumeVariable && resumeValue !== null) {
        currentInputs[resumeVariable] = resumeValue;
    } else {
        // Si es una ejecución completamente nueva desde el botón, limpiamos la memoria anterior
        currentInputs = {};
        consoleOutput.value = "Compilando de forma educada...\n";
    }
    
    const formData = new FormData();
    formData.append('code', codeContent);
    // Convertimos nuestro mapa de inputs a texto para enviarlo a Django
    formData.append('inputs', JSON.stringify(currentInputs));
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

    fetch('/run/', {  // Ajustá esta URL a tu ruta de Django
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        // Actualizamos la consola con lo que lleve procesado el programa
        consoleOutput.value = data.output;
        
        // ¿El intérprete de Python se detuvo esperando una entrada por teclado?
        if (data.status === 'awaiting_input') {
            // Le pedimos amigablemente el dato al estudiante mediante el navegador
            const userInput = prompt(`[Polite C Input Required]\nPor favor, introduce un valor para la variable: ${data.variable}`);
            
            // Reanudamos la ejecución automáticamente enviando el nuevo dato
            executeCode(data.variable, userInput);
        } else if (data.status === 'completed') {
            consoleOutput.value += "\n\n--- Ejecución terminada con éxito. ¡Gracias! ---";
        }
    })
    .catch(error => {
        consoleOutput.value = "Error de comunicación: " + error;
    });
}
</script>

</body>
</html>
